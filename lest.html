<!DOCTYPE html>
<html lang="ar" dir="rtl" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friho Live - جدول المباريات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://pl29632468.effectivecpmnetwork.com/48/df/a5/48dfa5dd53f86d51053549a74c01d961.js"></script>

</head>
<body class="bg-slate-950 text-white min-h-screen">
<script src="https://pl29632468.effectivecpmnetwork.com/48/df/a5/48dfa5dd53f86d51053549a74c01d961.js"></script>

    <nav class="p-6 flex flex-col items-center gap-4">
        <h1 class="text-2xl font-bold text-blue-500">Friho Live</h1>
<p><br /></p>
         <button onclick="window.location.href='index.html'" class="bg-slate-800 hover:bg-slate-700 text-white font-bold px-4 py-2 rounded-lg text-xs sm:text-sm border border-slate-700 transition-all active:scale-95 cursor-pointer">
            ← الرجوع 
        </button>
        <button onclick="window.location.reload()" class="bg-slate-800 hover:bg-slate-700 text-white px-4 py-1 rounded-lg text-sm border border-slate-700 transition-all">
            تحديث البيانات 🔄
        </button>
         <p><br /></p>
       
        
    </nav>

    <main class="max-w-4xl mx-auto p-4">
        <div id="matches-container" class="grid gap-4">
            <p class="text-center text-slate-500 animate-pulse">جاري جلب المباريات من قاعدة البيانات...</p>
        </div>
    </main>

    <div id="match-modal" class="hidden fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center p-4 z-50">
        <div class="bg-slate-900 p-6 rounded-2xl border border-slate-700 w-full max-w-lg relative shadow-2xl">
            <button onclick="closeModal()" class="absolute top-2 right-4 text-slate-400 text-3xl hover:text-white">&times;</button>
            <div id="modal-content" class="text-center"></div>
        </div>
    </div>

<script>
  // 1. إعداد Supabase
  const { createClient } = supabase; 
  const supabaseClient = createClient(
    'https://wyrqcgciftogeermqyyu.supabase.co', 
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind5cnFjZ2NpZnRvZ2Vlcm1xeXl1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1NzE0MzQsImV4cCI6MjA5NjE0NzQzNH0.CcDRqb9m8a2uTi26NRlnO-3Lr2wlJU86MzPrzTTgs6U'
  );

  // 2. تحميل البيانات
  async function loadMatches() {
    const container = document.getElementById('matches-container');
    try {
      const { data, error } = await supabaseClient.from('matches').select('*');
      
      if (error) throw error;
      
      if (!data || data.length === 0) {
        container.innerHTML = "<p class='text-center text-slate-500'>لا توجد مباريات حالياً. ننتظر بداية الموسم!</p>";
        return;
      }
      
      container.innerHTML = data.map(m => `
        <div onclick="showDetails('${m.home_team}', '${m.away_team}', '${m.competition_name || 'غير محدد'}', '${m.match_time || ''}')" 
             class="cursor-pointer bg-slate-900 p-4 rounded-xl border border-slate-800 hover:border-blue-500 transition-all flex justify-between items-center group">
          <span class="font-bold text-lg">${m.home_team}</span>
          <span class="text-slate-500 text-xs font-bold">VS</span>
          <span class="font-bold text-lg">${m.away_team}</span>
        </div>
      `).join('');
      
    } catch (err) {
      console.error("خطأ:", err);
      container.innerHTML = "<p class='text-center text-red-500'>فشل الاتصال بقاعدة البيانات.</p>";
    }
  }

  // 3. عرض تفاصيل المباراة
  function showDetails(home, away, comp, time) {
    const modal = document.getElementById('match-modal');
    const content = document.getElementById('modal-content');
    const date = time ? new Date(time).toLocaleString('ar-SA') : "لم يحدد الوقت";
    
    content.innerHTML = `
      <div class="mb-6">
         <h2 class="text-2xl font-bold text-blue-400">${home}</h2>
         <p class="text-slate-500 my-2">ضد</p>
         <h2 class="text-2xl font-bold text-blue-400">${away}</h2>
      </div>
      <div class="space-y-3 text-sm bg-slate-800 p-4 rounded-lg">
        <p>🏆 <span class="text-slate-400">البطولة:</span> ${comp}</p>
        <p>📅 <span class="text-slate-400">الموعد:</span> ${date}</p>
      </div>
      <button onclick="closeModal()" class="mt-8 w-full bg-blue-600 hover:bg-blue-500 py-2 rounded-lg font-bold transition-all">إغلاق</button>
    `;
    modal.classList.remove('hidden');
  }

  function closeModal() {
    document.getElementById('match-modal').classList.add('hidden');
  }

  // تشغيل الوظيفة عند تحميل الصفحة
  loadMatches();
</script>
</body>
</html>
