<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friho Live - المباريات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .match-card {
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .match-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
        .live-dot {
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen">
    <div class="max-w-4xl mx-auto p-4 md:p-6">
        <div class="flex items-center justify-between mb-8">
            <h1 class="text-2xl md:text-3xl font-bold">
                <span class="text-amber-400">⚽ المباريات</span>
                <span class="text-sm text-slate-400 font-normal mr-2">مباشر</span>
            </h1>
            <span id="live-count" class="bg-red-600 text-white text-sm px-3 py-1 rounded-full font-bold hidden">
                <span class="live-dot">●</span> <span id="count-number">0</span>
            </span>
        </div>
       <nav>
           <div class="flex items-center gap-4">
            <a href="index.html" class="bg-slate-800 hover:bg-slate-700 text-white px-4 py-2 rounded-lg text-sm font-bold transition-all flex items-center gap-2">
                <i class="fa-regular fa-house"></i>home
            </a>
            <h1 class="text-xl font-extrabold text-amber-500 tracking-tight">Friho<span class="text-white">Live</span></h1>
        </div>
       </nav>
        <p><br /></p><p><br /></p>
        <div id="matches-container" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="col-span-full text-center py-12">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-amber-400 border-t-transparent mb-4"></div>
                <p class="text-slate-400">جاري تحميل المباريات...</p>
            </div>
        </div>

        <div class="mt-10 text-center text-slate-600 text-sm border-t border-slate-800 pt-6">
            <p>© 2026 Friho Live - جميع الحقوق محفوظة</p>
        </div>
    </div>

    <script>
        // ================== Supabase Config ==================
        const SUPABASE_URL = 'https://vlwmzhdgfuqwcvyiiqhd.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZsd216aGRnZnVxd2N2eWlpcWhkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0MTY1MDYsImV4cCI6MjA5NTk5MjUwNn0.iFwK3TnZMzxe0pjz3m72gEozwO23s_yIZK2nmL0UHig';

        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ================== Load Matches ==================
        async function loadMatches() {
            const container = document.getElementById('matches-container');

            try {
                // تم إزالة .order('created_at', ...) لتجنب الخطأ
                const { data, error } = await sb
                    .from('matches')
                    .select('*');

                if (error) throw error;

                if (!data || data.length === 0) {
                    container.innerHTML = `
                        <div class="col-span-full text-center py-16">
                            <div class="text-6xl mb-4">📺</div>
                            <p class="text-slate-400 text-lg">لا توجد مباريات متاحة حالياً</p>
                        </div>
                    `;
                    return;
                }

                // Update live count
                document.getElementById('live-count').classList.remove('hidden');
                document.getElementById('count-number').textContent = data.length;

                // Render matches
                container.innerHTML = data.map((m, index) => {
                    const matchUrl = m.korazon_url || m.stream_url || m.url || '';
                    const matchName = m.match_name || m.name || `مباراة ${index + 1}`;
                    const matchTime = m.match_time || m.time || '';
                    const matchLeague = m.league || m.category || '';
                    const matchLogo = m.logo || m.team_logo || '';

                    return `
                        <div class="match-card bg-slate-800/80 backdrop-blur p-5 md:p-6 rounded-2xl border border-slate-700/50">
                            <div class="flex items-start gap-4">
                                ${matchLogo ? `<img src="${matchLogo}" alt="" class="w-12 h-12 rounded-full object-cover bg-slate-700" onerror="this.style.display='none'">` : ''}
                                <div class="flex-1 min-w-0">
                                    <h3 class="text-lg md:text-xl font-bold text-white truncate">${matchName}</h3>
                                    ${matchLeague ? `<p class="text-sm text-amber-400/80 mt-1"><i class="inline-block w-4">🏆</i> ${matchLeague}</p>` : ''}
                                    ${matchTime ? `<p class="text-xs text-slate-500 mt-1"><i class="inline-block w-4">🕒</i> ${matchTime}</p>` : ''}
                                </div>
                            </div>
                            ${matchUrl ? `
                                <a href="live.html?url=${encodeURIComponent(matchUrl)}&title=${encodeURIComponent(matchName)}"
                                   class="w-full mt-5 flex items-center justify-center gap-2 bg-gradient-to-l from-amber-600 to-amber-500 hover:from-amber-500 hover:to-amber-400 text-slate-900 py-3 rounded-xl font-bold text-sm md:text-base transition-all duration-200">
                                    مشاهدة البث المباشر
                                </a>
                            ` : `<div class="w-full mt-5 text-center py-3 bg-slate-700 rounded-xl text-slate-500">الرابط غير متاح</div>`}
                        </div>
                    `;
                }).join('');

            } catch (err) {
                console.error('Error loading matches:', err);
                container.innerHTML = `
                    <div class="col-span-full text-center py-16">
                        <p class="text-red-400">حدث خطأ في تحميل البيانات</p>
                        <button onclick="location.reload()" class="mt-4 bg-amber-600 px-6 py-2 rounded-xl text-slate-900 font-bold">إعادة المحاولة</button>
                    </div>
                `;
            }
        }

        loadMatches();
        setInterval(loadMatches, 60000);
    </script>
</body>
</html>
